<!DOCTYPE html>

<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Aleksandra ❤️ Hubert | 12.06.2026</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Arial,sans-serif;
min-height:100vh;
background:
linear-gradient(
rgba(0,0,0,.45),
rgba(0,0,0,.45)
),
url('hero.jpg');
background-size:cover;
background-position:center;
background-repeat:no-repeat;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:rgba(255,255,255,.95);
backdrop-filter:blur(6px);
width:100%;
max-width:550px;
padding:40px 30px;
border-radius:24px;
text-align:center;
box-shadow:0 10px 40px rgba(0,0,0,.25);
}

.heart{
font-size:48px;
margin-bottom:10px;
}

h1{
font-size:38px;
margin-bottom:10px;
color:#222;
}

.date{
font-size:20px;
color:#666;
margin-bottom:30px;
}

.btn{
display:block;
width:100%;
padding:18px;
border:none;
border-radius:14px;
margin:12px 0;
font-size:20px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
transition:.2s;
}

.btn:hover{
transform:scale(1.02);
}

.upload{
background:#d4af37;
color:black;
}

.gallery{
background:#222;
color:white;
}

.info{
margin-top:25px;
font-size:15px;
line-height:1.6;
color:#666;
}

#status{
margin-top:20px;
font-weight:bold;
font-size:16px;
}

input[type=file]{
display:none;
}

.footer{
margin-top:25px;
font-size:13px;
color:#888;
}

</style>

</head>
<body>

<div class="card">

<div class="heart">💍</div>

<h1>Aleksandra ❤️ Hubert</h1>

<div class="date">
12.06.2026
</div>

<input
type="file"
id="fileInput"
accept="image/*"
multiple

>

<button
class="btn upload"
onclick="document.getElementById('fileInput').click()">
📸 Dodaj zdjęcia </button>

<a
class="btn gallery"
href="https://drive.google.com/drive/folders/1d8jlh3_fa7kiEqkDqwvxv_CFtUI_uxWp?usp=sharing"
target="_blank">
🖼️ Zobacz galerię </a>

<div id="status"></div>

<div class="info">
Dziękujemy za wspólne świętowanie ❤️<br><br>
Dodawaj zdjęcia i pomóż nam zachować wspomnienia
z tego wyjątkowego dnia.
</div>

<div class="footer">
Możesz przesłać wiele zdjęć jednocześnie.
</div>

</div>

<script>

const CLOUD_NAME = "dxrsjpxpq";
const PRESET = "wesele_upload";

const fileInput = document.getElementById("fileInput");
const statusBox = document.getElementById("status");

fileInput.addEventListener("change", uploadFiles);

async function uploadFiles() {

const files = fileInput.files;

if(files.length === 0) return;

statusBox.innerHTML =
`⏳ Przesyłanie ${files.length} zdjęć...`;

let uploaded = 0;

for(const file of files){

try{

const formData = new FormData();

formData.append("file", file);
formData.append("upload_preset", PRESET);

const response = await fetch(
`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`,
{
method:"POST",
body:formData
});

if(response.ok){
uploaded++;
}

}catch(error){
console.error(error);
}

}

statusBox.innerHTML =
`✅ Pomyślnie przesłano ${uploaded} zdjęć`;

fileInput.value = "";

setTimeout(()=>{
statusBox.innerHTML="";
},6000);

}

</script>

</body>
</html>
